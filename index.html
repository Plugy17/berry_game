<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BERRY RUNNER ONLINE</title>
    <link rel="stylesheet" href="style.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
</head>
<body>

<div id="menu" class="screen">
    <div id="menu-particles"></div>

    <!-- Шапка -->
    <div class="top-bar-container">
        <div id="welcome" class="welcome-text">Герой BERRY</div>
        <div id="total-balance" class="balance-info">
            <!-- Сюда JS вставит валюту -->
        </div>
        <div id="menuLeaderboard" class="record-info">🏆 0</div>
    </div>

    <!-- Область кнопок -->
    <div class="menu-controls">
        <input id="nick" type="text" placeholder="Имя героя..." maxlength="12" />
        
        <label class="difficulty-label">СЛОЖНОСТЬ:</label>
        <select id="difficulty">
            <option value="easy">🟩 Легко</option>
            <option value="medium" selected>🟨 Средне</option>
            <option value="hard">🟥 Сложно</option>
        </select>
        
        <button class="main-btn" onclick="startGame()">ИГРАТЬ</button>
        <button class="sub-btn" onclick="openBuffs()">⚡ Баффы</button>
        <button class="sub-btn vip-btn" onclick="openShop()">💎 VIP Магазин</button>
        <button class="sub-btn" onclick="openLeaderboard()">🏆 Рейтинг</button>
        
        <div style="height: 40px; width: 100%;"></div>
    </div>
</div>

<div id="game" class="screen hidden">
    <!-- Слой для эффектов -->
    <div id="effects-layer"></div>

    <!-- Обновленный HUD -->
    <div class="top-bar-container">
        <div id="hud">
            <!-- Lvl | Ice | Gold -->
        </div> 
    </div>
    
    <button id="backBtn" onclick="backToMenu()">🏠</button>
    
    <div id="combo-container">
        <div id="combo-ui" class="hidden">x2</div>
        <div id="combo-msg"></div> 
    </div>

    <div id="bonus-panel">
        <div class="bonus-btn" onclick="useShield()">
            <img src="assets/shield_icon.png" class="bonus-icon-img" alt="Shield">
            <span id="count-shield">0</span>
        </div>
        <div class="bonus-btn" onclick="useMagnet()">
            <img src="assets/magnet_icon.png" class="bonus-icon-img" alt="Magnet">
            <span id="count-magnet">0</span>
        </div>
    </div>
    
    <div id="player"></div> 
    <div id="obstacle"></div> 
</div>

<div id="gameOverScreen" class="screen hidden" style="background: rgba(0,0,0,0.85); z-index: 1000;">
    <div class="go-card" style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%;">
        <div class="shop-title" style="font-size: 60px;">БА-БАХ!</div>
        <div class="currency-row" style="font-size: 32px; margin: 20px 0;">
            <span id="final-score">0</span> <span class="ice-icon"></span>
        </div>
        <div class="menu-controls" style="width: 280px;">
            <button id="revive-btn" class="buy-button gold" onclick="tryRevive()">
                ✨ ВОСКРЕСНУТЬ (1 💎)
            </button>
            <button class="main-btn" onclick="startGame()">ИГРАТЬ ЕЩЕ</button>
            <button class="sub-btn" onclick="backToMenu()">В МЕНЮ</button>
        </div>
    </div>
</div>

<!-- БАФФЫ -->
<div id="shop" class="screen hidden">
    <h2 class="shop-title">БАФФЫ</h2>
    <div id="shop-balance" class="balance-info" style="margin-bottom: 20px;">0 🍦</div>

    <div class="shop-container">
        <div class="shop-item">
            <img src="assets/shield_icon.png" alt="Shield">
            <div class="item-title" style="color: white; margin-bottom: 5px;">ЩИТ</div>
            <button class="buy-button" onclick="buyItem('shield')">300 🍦</button>
        </div>

        <div class="shop-item">
            <img src="assets/magnet_icon.png" alt="Magnet">
            <div class="item-title" style="color: white; margin-bottom: 5px;">МАГНИТ</div>
            <button class="buy-button" onclick="buyItem('magnet')">500 🍦</button>
        </div>
    </div>
    
    <div class="shop-item exchange-card" style="width: 100%; max-width: 350px; margin-top: 15px;">
        <div class="item-title" style="color: #ffd700;">ОБМЕННИК</div>
        <p style="color: white; margin: 5px 0;">5000 🍦 = 1 💎</p>
        <button class="buy-button" onclick="convertIceToGold()">ОБМЕНЯТЬ</button>
    </div>
    
    <button class="sub-btn" style="margin-top: 30px;" onclick="closeShop()">НАЗАД</button>
</div>

<!-- VIP МАГАЗИН -->
<div id="realShop" class="screen hidden">
    <h2 class="shop-title">VIP SHOP</h2>
    <div class="shop-container">
        <div class="shop-item vip-card">
            <div class="item-title" style="color: #ffd700;">GOLD СКИН</div>
            <p style="color: #eee; font-size: 12px; text-align: center;">Магнит сильнее на 10%</p>
            <button class="buy-button gold" onclick="buyVipItem('skin')">10 💎</button>
        </div>
        <div class="shop-item vip-card">
            <div class="item-title" style="color: #ffd700;">+1 СЛОТ</div>
            <p style="color: #eee; font-size: 12px; text-align: center;">Запас щитов</p>
            <button class="buy-button gold" onclick="buyVipItem('slot')">5 💎</button>
        </div>
    </div>
    <button class="sub-btn" style="margin-top: 30px;" onclick="document.getElementById('realShop').classList.add('hidden'); document.getElementById('menu').classList.remove('hidden');">НАЗАД</button>
</div>

<!-- РЕЙТИНГ -->
<div id="leaderboardScreen" class="screen hidden">
    <h2 class="shop-title">ТОП ГЕРОЕВ</h2>
    <div id="leaderboard-list" style="width: 100%; display: flex; flex-direction: column; align-items: center;">
        <!-- Данные из Firebase -->
    </div>
    <button class="sub-btn" style="margin-top: 30px;" onclick="closeLeaderboard()">НАЗАД</button>
</div>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyABKHaAdlSFq1KzURXmCF5Q-9xMUgE4Ot0",
    authDomain: "berry-game-4fa9b.firebaseapp.com",
    databaseURL: "https://berry-game-4fa9b-default-rtdb.firebaseio.com",
    projectId: "berry-game-4fa9b",
    storageBucket: "berry-game-4fa9b.firebasestorage.app",
    messagingSenderId: "736707445306",
    appId: "1:736707445306:web:87a61ea4b725bd3071eb03",
    measurementId: "G-LLJ9L848G0"
  };
  
  try {
    firebase.initializeApp(firebaseConfig);
    window.db = firebase.database();
  } catch (e) { console.error("Firebase error", e); }

  function openShop() {
      document.getElementById('menu').classList.add('hidden');
      document.getElementById('realShop').classList.remove('hidden');
  }

  function tryRevive() {
      if (window.goldenIce >= 1 && !window.usedReviveThisRun) {
          window.goldenIce -= 1;
          window.usedReviveThisRun = true;
          window.gameRunning = true;
          window.obstacleY = -150;
          document.getElementById("gameOverScreen").classList.add("hidden");
          window.saveUserData();
          window.updateScore();
          window.update(); // Перезапуск цикла
      } else {
          alert("Недостаточно алмазов или уже использовано!");
      }
  }
</script>
<script src="game.js"></script>
</body>
</html>

<<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>FROST BERRY GAME</title>

<style>
body {
    margin: 0;
    background: #0a0f1e;
    overflow: hidden;
    font-family: Arial;
    color: white;
}

#game {
    position: relative;
    width: 100vw;
    height: 100vh;
}

/* PLAYER */
#player {
    width: 60px;
    height: 60px;
    background: linear-gradient(145deg, gold, orange);
    border-radius: 15px;
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    box-shadow: 0 0 20px gold;
    text-align: center;
    line-height: 60px;
    font-size: 30px;
}

/* ENEMY */
.enemy {
    width: 50px;
    height: 50px;
    background: red;
    position: absolute;
    border-radius: 50%;
    box-shadow: 0 0 10px red;
}

/* COIN */
.coin {
    width: 25px;
    height: 25px;
    background: yellow;
    position: absolute;
    border-radius: 50%;
    box-shadow: 0 0 10px yellow;
}

/* BOMB */
.bomb {
    width: 20px;
    height: 20px;
    background: cyan;
    position: absolute;
    border-radius: 50%;
    box-shadow: 0 0 15px cyan;
}

/* UI */
.panel {
    position: absolute;
    top: 10px;
    left: 10px;
    background: rgba(0,0,0,0.6);
    padding: 10px;
    border-radius: 10px;
}

button {
    padding: 10px;
    margin: 5px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    background: #ffcc00;
    font-weight: bold;
}
</style>
</head>

<body>

<div id="game">

    <div class="panel">
        💰: <span id="coins">0</span><br>
        💣: <span id="bombs">0</span><br><br>

        <button onclick="dropBomb()">🍦 Бомба</button>
        <button onclick="spawnCoin()">💰 Монета</button>
        <button onclick="spawnEnemy()">👾 Враг</button>
    </div>

    <div id="player">🧍</div>

</div>

<script>
let coins = 0;
let bombs = 5;

let player = {
    x: window.innerWidth / 2,
    y: window.innerHeight / 2,
    speed: 10
};

const p = document.getElementById("player");

function updateUI(){
    document.getElementById("coins").innerText = coins;
    document.getElementById("bombs").innerText = bombs;
}

function renderPlayer(){
    p.style.left = player.x + "px";
    p.style.top = player.y + "px";
}

document.addEventListener("keydown", (e) => {
    if(e.key === "w") player.y -= player.speed;
    if(e.key === "s") player.y += player.speed;
    if(e.key === "a") player.x -= player.speed;
    if(e.key === "d") player.x += player.speed;

    renderPlayer();
});

/* 💣 БОМБА */
function dropBomb(){
    if(bombs <= 0) return;

    bombs--;

    let b = document.createElement("div");
    b.className = "bomb";
    b.style.left = player.x + "px";
    b.style.top = player.y + "px";

    document.getElementById("game").appendChild(b);

    let enemies = document.getElementsByClassName("enemy");

    setInterval(() => {
        let bx = b.offsetLeft;
        let by = b.offsetTop;

        for(let e of enemies){
            let ex = e.offsetLeft;
            let ey = e.offsetTop;

            if(Math.abs(bx - ex) < 40 && Math.abs(by - ey) < 40){
                e.remove();
                coins += 5;
                updateUI();
            }
        }

        b.style.top = (b.offsetTop - 5) + "px";
    }, 30);

    setTimeout(() => b.remove(), 3000);

    updateUI();
}

/* 💰 монеты */
function spawnCoin(){
    let c = document.createElement("div");
    c.className = "coin";
    c.style.left = Math.random() * window.innerWidth + "px";
    c.style.top = Math.random() * window.innerHeight + "px";

    c.onclick = () => {
        coins++;
        c.remove();
        updateUI();
    };

    document.getElementById("game").appendChild(c);
}

/* 👾 враги */
function spawnEnemy(){
    let e = document.createElement("div");
    e.className = "enemy";
    e.style.left = Math.random() * window.innerWidth + "px";
    e.style.top = Math.random() * window.innerHeight + "px";

    document.getElementById("game").appendChild(e);
}

/* автоспавн */
setInterval(() => {
    if(Math.random() > 0.5) spawnCoin();
    if(Math.random() > 0.7) spawnEnemy();
    bombs = Math.min(bombs + 1, 10);
    updateUI();
}, 4000);

renderPlayer();
updateUI();
</script>

</body>
</html>

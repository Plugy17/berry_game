<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BERRY RUNNER ONLINE</title>
    <link rel="stylesheet" href="style.css">
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>

<!-- ЭКРАН ЗАГРУЗКИ -->
<div id="loading-screen">
    <div class="loader-content">
        <div class="spinner"></div>
        <h1 class="loading-title">ЗАГРУЗКА...</h1>
        <div class="user-info">
            <p>ID: <span id="user-id-display">Определяем...</span></p>
        </div>
        <button id="continue-btn" class="hidden">ПРОДОЛЖИТЬ</button>
    </div>
</div>

<!-- КОСМИЧЕСКИЙ ФОН -->
<div class="background-wrapper">
    <div class="nebula-1"></div>
    <div class="nebula-2"></div>
    <div class="stars-overlay"></div>
</div>

<!-- ГЛАВНОЕ МЕНЮ -->
<div id="menu" class="screen">
    <div id="menu-particles"></div>

    <div class="top-bar-container">
        <div id="welcome" class="welcome-text">Герой BERRY</div>
        <div class="menu-stats-container">
            
            <!-- СЕКЦИЯ ВЫБОРА СКИНА В МЕНЮ -->
            <div class="skin-menu-section">
                <div class="skin-carousel">
                    <button class="nav-btn prev" id="prevSkin">❮</button>
                    <div class="skin-item-preview">
                        <div id="skinPreview" class="skin-main-img"></div>
                    </div>
                    <button class="nav-btn next" id="nextSkin">❯</button>
                </div>

                <div class="skin-info">
                    <div id="skinName" class="skin-title-text">БЕРРИ</div>
                    <button id="selectSkinBtn" class="select-btn">ВЫБРАТЬ</button>
                </div>
            </div>

            <!-- БАЛАНС И РЕКОРД -->
            <div id="total-balance" class="balance-info">
                <span id="menuCoinCount">0</span> | 
                <span id="menuDiamondCount">0</span> 
            </div>
            <div id="menuLeaderboard" class="record-info">🏆 0</div>
        </div>
    </div>

    <div class="spacer-middle"></div>

    <div class="menu-controls">
        <input id="nick" type="text" placeholder="Имя героя..." maxlength="12" />
        <select id="difficulty">
            <option value="easy">🟩 Легко</option>
            <option value="medium" selected>🟨 Средне</option>
            <option value="hard">🟥 Сложно</option>
        </select>
        <button onclick="if(typeof startGame === 'function') startGame()">ИГРАТЬ</button>
        <button onclick="if(typeof openShop === 'function') openShop()">🛒 Магазин</button>
    </div>
</div>

<!-- ИГРОВОЙ ЭКРАН -->
<div id="game" class="screen hidden">
    <div id="game-top-bar">
        <button id="pauseBtn" class="clean-button" onclick="togglePause()">
            <img id="pauseIcon" src="assets/pause.png" alt="Пауза">
        </button>

        <div id="hud">
            <span class="ice-icon"></span> <span id="coinCount">0</span> | 
            <span id="diamondCount">0</span> | 
            🏆 <span id="bestScore">0</span>
        </div>

        <button id="homeBtn" class="clean-button" onclick="backToMenu()">
            <img src="assets/home.png" alt="Домой">
        </button>
    </div>

    <div id="effects-layer"></div>
    <div id="combo-display" class="combo-text"></div>
    <div id="player"></div> 

    <!-- КНОПКИ БОНУСОВ -->
    <div id="bonus-panel">
        <div class="bonus-btn" onclick="useShield()">
            <img src="assets/shield_icon.png" class="bonus-icon-img" alt="Shield">
            <span id="count-shield">0</span>
        </div>
        <div class="bonus-btn" onclick="useMagnet()">
            <img src="assets/magnet_icon.png" class="bonus-icon-img" alt="Magnet">
            <span id="count-magnet">0</span>
        </div>
    </div>
</div>

<!-- ЭКРАН GAME OVER -->
<div id="gameOverScreen" class="hidden">
    <div class="go-card">
        <div class="go-title">БА-БАХ!</div>
        <div class="go-stats">
            <span class="ice-icon-big"></span>
            <span id="final-score">0</span>
        </div>
        <div class="go-btn-container">
            <button class="btn-restart" onclick="startGame()">ИГРАТЬ ЕЩЕ</button>
            <button class="btn-exit" onclick="backToMenu()">В МЕНЮ</button>
        </div>
    </div>
</div>

<!-- МАГАЗИН -->
<div id="shop" class="screen hidden">
    <h2 class="shop-title">МАГАЗИН</h2>

    <div class="shop-balance-container">
        <div id="balance-anim-target" class="shop-balance-wrapper">
            <span id="shop-balance">0 <span class="ice-icon"></span></span> | 
            <span id="shop-diamonds">0 <span class="diamond-icon"></span></span>
        </div>
    </div>

    <div class="shop-container">
        <!-- ТОВАР 1: ЗВЕЗДНЫЙ БЕРРИ -->
        <div class="shop-item">
            <img src="assets/berry2.png" alt="Star Berry">
            <div class="item-title">ЗВЕЗДНЫЙ БЕРРИ</div>
            <div style="color: #00eaff; font-size: 11px; margin-bottom: 10px;">Магнит +6с | Комбо x8</div>
            <button id="buyStarBtn" class="buy-button" onclick="buySkin('star', 100)">
                100 <span class="diamond-icon"></span>
            </button>
        </div>

        <!-- ТОВАР 2: ПИРАТ БЕРРИ -->
        <div class="shop-item">
            <img src="assets/berry3.png" alt="Pirate Berry">
            <div class="item-title">ПИРАТ БЕРРИ</div>
            <div style="color: #00eaff; font-size: 11px; margin-bottom: 10px;">Игнор подарков + 1 жизнь</div>
            <button class="buy-button" onclick="buySkin('pirate', 300)">
                300 <span class="diamond-icon"></span>
            </button>
        </div>

        <!-- ТОВАР 3: СИЛВЕР БЕРРИ -->
        <div class="shop-item">
            <img src="assets/berry4.png" alt="Silver Berry">
            <div class="item-title">СИЛВЕР БЕРРИ</div>
            <div style="color: #00eaff; font-size: 11px; margin-bottom: 10px;">30с защиты за алмаз</div>
            <button class="buy-button" onclick="buySkin('silver', 500)">
                500 <span class="diamond-icon"></span>
            </button>
        </div>

        <!-- ТОВАР 4: ЩИТ -->
        <div class="shop-item">
            <img src="assets/shield_icon.png" alt="Shield">
            <div class="item-title">ЩИТ</div>
            <button class="buy-button" onclick="buyItem('shield')">
                КУПИТЬ 300 <span class="ice-icon"></span>
            </button>
        </div>

        <!-- ТОВАР 5: МАГНИТ -->
        <div class="shop-item">
            <img src="assets/magnet_icon.png" alt="Magnet">
            <div class="item-title">МАГНИТ</div>
            <button class="buy-button" onclick="buyItem('magnet')">
                КУПИТЬ 500 <span class="ice-icon"></span>
            </button>
        </div>

        <!-- ТОВАР 6: ОБМЕННИК -->
        <div class="shop-item exchange-block">
            <div class="item-title" style="font-size: 16px;">ОБМЕН ВАЛЮТЫ</div>
            <button class="buy-button" onclick="exchangeIceToDiamond()">
                1000 <span class="ice-icon"></span> ➔ 10 <span class="diamond-icon"></span>
            </button>
        </div>
    </div>

    <button id="backBtnShop" class="shop-exit-btn" onclick="closeShop()">НАЗАД</button>
</div>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyABKHaAdlSFq1KzURXmCF5Q-9xMUgE4Ot0",
    authDomain: "berry-game-4fa9b.firebaseapp.com",
    databaseURL: "https://berry-game-4fa9b-default-rtdb.firebaseio.com",
    projectId: "berry-game-4fa9b",
    storageBucket: "berry-game-4fa9b.firebasestorage.app",
    messagingSenderId: "736707445306",
    appId: "1:736707445306:web:87a61ea4b725bd3071eb03",
    measurementId: "G-LLJ9L848G0"
  };
  
  try {
    if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
    }
    window.db = firebase.database();
    console.log("Firebase подключен успешно!");

    // ГИРЯ: Сразу после инициализации БД пробуем загрузить игрока
    const tg = window.Telegram?.WebApp;
    if (tg) {
        tg.ready();
        // Получаем ID. Если запускаем в бразуере для теста — ставим 'test_user'
        const userId = tg.initDataUnsafe?.user?.id || "test_user";
        
        // Проверяем, готова ли функция загрузки (она в game.js)
        if (typeof loadUserData === "function") {
            loadUserData(userId);
        } else {
            // Если game.js еще не загрузился, подождем немного
            window.addEventListener('load', () => loadUserData(userId));
        }
    }
  } catch (e) { 
    console.error("Firebase init error:", e); 
    window.db = null; 
  }
</script>

<!-- ГЛАВНЫЙ СКРИПТ ИГРЫ -->
<script src="game.js?v=89.6"></script>
</body>
</html>

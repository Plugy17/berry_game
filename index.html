<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>BERRY 2D GAME</title>

<style>
body {
    margin: 0;
    background: #0b0f1a;
    font-family: Arial;
    color: white;
}

#game {
    width: 100vw;
    height: 100vh;
    position: relative;
    overflow: hidden;
}

/* UI */
.panel {
    position: absolute;
    top: 10px;
    left: 10px;
    background: rgba(0,0,0,0.5);
    padding: 10px;
    border-radius: 10px;
}

button {
    padding: 10px;
    margin: 5px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

/* berry */
.berry {
    width: 30px;
    height: 30px;
    position: absolute;
    background: red;
    border-radius: 50%;
    animation: fall 5s linear infinite;
}

@keyframes fall {
    from { top: -50px; }
    to { top: 100vh; }
}

/* player */
#player {
    width: 80px;
    height: 80px;
    position: absolute;
    bottom: 50px;
    left: 50%;
    transform: translateX(-50%);
    background: gold;
    border-radius: 20px;
    text-align: center;
    line-height: 80px;
}
</style>
</head>

<body>

<div id="game">

    <div class="panel">
        🍓: <span id="berries">0</span><br>
        ⚡: <span id="power">0</span><br><br>

        <button onclick="farm()">🍓 Фарм</button>
        <button onclick="upgrade()">⚡ Энергия</button>
        <button onclick="spawnPet()">🐾 Питомец</button>
    </div>

    <div id="player">🧍</div>

</div>

<script>
let berries = 0;
let power = 0;
let pet = false;

/* обновление UI */
function update() {
    document.getElementById("berries").innerText = berries;
    document.getElementById("power").innerText = power;
}

/* фарм */
function farm() {
    let gain = Math.floor(Math.random() * 5) + 1;

    if (pet) gain *= 2;

    berries += gain;
    update();

    showText("+" + gain + " 🍓");
}

/* энергия */
function upgrade() {
    power++;
    showText("⚡ +1 энергия");
    update();
}

/* питомец */
function spawnPet() {
    pet = true;
    showText("🐾 Питомец активирован!");
}

/* падающие ягоды */
function createBerry() {
    let b = document.createElement("div");
    b.className = "berry";
    b.style.left = Math.random() * window.innerWidth + "px";

    b.onclick = () => {
        berries += 1;
        update();
        b.remove();
    };

    document.getElementById("game").appendChild(b);

    setTimeout(() => b.remove(), 5000);
}

setInterval(createBerry, 1200);

/* текст эффект */
function showText(text) {
    let t = document.createElement("div");
    t.innerText = text;
    t.style.position = "absolute";
    t.style.left = "50%";
    t.style.top = "40%";
    t.style.transform = "translate(-50%)";
    t.style.fontSize = "20px";
    t.style.color = "yellow";

    document.getElementById("game").appendChild(t);

    setTimeout(() => t.remove(), 800);
}

update();
</script>

</body>
</html>

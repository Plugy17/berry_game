<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>FROST GAME FIX</title>

<style>
body {
    margin: 0;
    background: #070b18;
    overflow: hidden;
    font-family: Arial;
    color: white;
}

#game {
    width: 100vw;
    height: 100vh;
    position: relative;
}

/* PLAYER */
#player {
    width: 50px;
    height: 50px;
    background: gold;
    position: absolute;
    border-radius: 12px;
    box-shadow: 0 0 20px gold;
    text-align: center;
    line-height: 50px;
    font-size: 24px;
}

/* ENEMY */
.enemy {
    width: 40px;
    height: 40px;
    background: red;
    position: absolute;
    border-radius: 50%;
}

/* BOMB */
.bomb {
    width: 15px;
    height: 15px;
    background: cyan;
    position: absolute;
    border-radius: 50%;
    box-shadow: 0 0 10px cyan;
}

/* EXPLOSION */
.explosion {
    width: 80px;
    height: 80px;
    background: rgba(0,255,255,0.3);
    position: absolute;
    border-radius: 50%;
    transform: translate(-50%, -50%);
}
</style>
</head>

<body>

<div id="game">
    <div id="player">🧍</div>
</div>

<script>
let player = {
    x: window.innerWidth / 2,
    y: window.innerHeight / 2,
    speed: 4
};

let keys = {};
let mouse = {x: 0, y: 0};

const p = document.getElementById("player");

/* --- CONTROL HOLD --- */
document.addEventListener("keydown", (e) => keys[e.key] = true);
document.addEventListener("keyup", (e) => keys[e.key] = false);

/* mouse aim */
document.addEventListener("mousemove", (e) => {
    mouse.x = e.clientX;
    mouse.y = e.clientY;
});

/* PLAYER MOVE LOOP */
function gameLoop(){

    if(keys["w"]) player.y -= player.speed;
    if(keys["s"]) player.y += player.speed;
    if(keys["a"]) player.x -= player.speed;
    if(keys["d"]) player.x += player.speed;

    p.style.left = player.x + "px";
    p.style.top = player.y + "px";

    requestAnimationFrame(gameLoop);
}

/* ENEMIES */
function spawnEnemy(){
    let e = document.createElement("div");
    e.className = "enemy";
    e.x = Math.random() * window.innerWidth;
    e.y = Math.random() * window.innerHeight;

    e.style.left = e.x + "px";
    e.style.top = e.y + "px";

    document.getElementById("game").appendChild(e);

    setInterval(() => {
        let dx = player.x - e.x;
        let dy = player.y - e.y;

        e.x += dx * 0.01;
        e.y += dy * 0.01;

        e.style.left = e.x + "px";
        e.style.top = e.y + "px";
    }, 30);
}

/* 🍦 BOMB (click to shoot) */
document.addEventListener("click", () => {

    let b = document.createElement("div");
    b.className = "bomb";

    let dx = mouse.x - player.x;
    let dy = mouse.y - player.y;

    let dist = Math.sqrt(dx*dx + dy*dy);

    let vx = (dx / dist) * 8;
    let vy = (dy / dist) * 8;

    let x = player.x;
    let y = player.y;

    b.style.left = x + "px";
    b.style.top = y + "px";

    document.getElementById("game").appendChild(b);

    let move = setInterval(() => {
        x += vx;
        y += vy;

        b.style.left = x + "px";
        b.style.top = y + "px";

        /* collision */
        document.querySelectorAll(".enemy").forEach(en => {
            let ex = en.offsetLeft;
            let ey = en.offsetTop;

            if(Math.abs(x - ex) < 40 && Math.abs(y - ey) < 40){

                /* explosion */
                let exx = document.createElement("div");
                exx.className = "explosion";
                exx.style.left = x + "px";
                exx.style.top = y + "px";
                document.getElementById("game").appendChild(exx);

                setTimeout(() => exx.remove(), 300);

                en.remove();
            }
        });

    }, 20);

    setTimeout(() => {
        clearInterval(move);
        b.remove();
    }, 2000);
});

/* spawn enemies */
setInterval(spawnEnemy, 2000);

gameLoop();
</script>

</body>
</html>

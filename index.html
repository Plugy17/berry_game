<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Berry Land</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- 🔥 МЕНЮ -->
<div id="menu">
    <h1 class="logo">BERRY LAND</h1>
    <button onclick="startGame()">ИГРАТЬ</button>
</div>

<!-- 🎮 ИГРА -->
<canvas id="game"></canvas>

<!-- 🏠 КНОПКИ -->
<div id="ui">
    <button id="homeBtn" onclick="goHome()">🏠</button>
</div>

<!-- 💀 GAME OVER -->
<div id="gameOver">
    <h2>💀 Game Over</h2>
    <button onclick="restartGame()">Replay</button>
</div>

<script src="game.js"></script>
</body>
</html>

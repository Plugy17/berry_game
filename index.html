<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>BERRY RUNNER</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="menu" class="screen">
    <h1 class="game-title">BERRY RUNNER</h1>
    
    <div id="welcome" class="welcome-text"></div>
    
    <div class="menu-stats-container">
        <div id="total-balance" class="balance-info">0 <img src="assets/icecream.png" style="width:20px;"></div>
        <div id="menuLeaderboard" class="record-info">🏆 0</div>
    </div>

    <div class="menu-controls">
        <input id="nick" placeholder="Введите ник..." maxlength="12" />
        <select id="difficulty">
            <option value="easy">🟢 Легко</option>
            <option value="medium" selected>🟡 Средне</option>
            <option value="hard">🔴 Сложно</option>
        </select>
        <button class="play-btn" onclick="startGame()">ИГРАТЬ</button>
        <button class="shop-btn" onclick="openShop()">🛒 Магазин</button>
    </div>
</div>

<div id="game" class="screen hidden">
    <div id="hud"></div> 
    <button id="backBtn" onclick="backToMenu()">🏠</button>

    <div id="bonus-panel">
        <div class="bonus-btn" onclick="useShield()">
            🛡️ <span id="count-shield">0</span> 
        </div>
        <div class="bonus-btn" onclick="useMagnet()">
            🧲 <span id="count-magnet">0</span>
        </div>
    </div>

    <div id="track">
        <div id="player"></div> 
        <div id="obstacle"></div> 
    </div>
</div>

<div id="shop" class="screen hidden">
    <h2>🛒 МАГАЗИН</h2>
    <div id="shop-balance" class="shop-balance-info">Balance: 0</div>
    
    <div class="shop-item">
        <span>🛡️ ЩИТ (300 BERRY)</span>
        <button onclick="buyItem('shield')">КУПИТЬ</button>
    </div>
    <div class="shop-item">
        <span>🧲 МАГНИТ (500 BERRY)</span>
        <button onclick="buyItem('magnet')">КУПИТЬ</button>
    </div>
    
    <button onclick="closeShop()" class="back-from-shop">Назад</button>
</div>

<script src="game.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Berry Runner</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Меню -->
    <div id="screen-menu" class="screen">
        <div class="top-bar">
            <div id="ui-nick">ГЕРОЙ: ---</div>
            <div id="ui-balance">0 🍦 | 0 💎</div>
        </div>
        
        <div class="menu-layout">
            <h1 class="logo">BERRY RUNNER</h1>
            <button class="btn-play" onclick="game.start()">ИГРАТЬ</button>
            <div class="menu-row">
                <button class="btn-sub" onclick="ui.show('screen-shop')">МАГАЗИН</button>
                <button class="btn-sub" onclick="ui.show('screen-lead')">РЕЙТИНГ</button>
            </div>
        </div>
    </div>

    <!-- Игра -->
    <div id="screen-game" class="screen hidden">
        <div class="game-hud">
            <div id="game-score">0</div>
            <div class="game-bonuses">
                <div class="bonus-slot" onclick="items.use('shield')">🛡️ <span id="inv-shield">0</span></div>
                <div class="bonus-slot" onclick="items.use('magnet')">🧲 <span id="inv-magnet">0</span></div>
            </div>
        </div>
        <div id="world">
            <div id="player"></div>
            <div id="obstacle"></div>
        </div>
    </div>

    <!-- Магазин (Сетка 2х2) -->
    <div id="screen-shop" class="screen hidden">
        <h2>МАГАЗИН</h2>
        <div class="shop-grid" id="shop-items-container">
            <!-- Сюда JS вставит карточки -->
        </div>
        <button class="btn-back" onclick="ui.show('screen-menu')">НАЗАД</button>
    </div>

    <script src="script.js"></script>
</body>
</html>

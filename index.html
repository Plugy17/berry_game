<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Berry Game</title>

<style>
body {
    margin: 0;
    background: #0f0f0f;
    overflow: hidden;
    font-family: Arial;
}

#player {
    width: 50px;
    height: 50px;
    background: gold;
    position: absolute;
    border-radius: 10px;
}

#berry {
    width: 25px;
    height: 25px;
    background: lime;
    border-radius: 50%;
    position: absolute;
}
</style>
</head>

<body>

<div id="player"></div>
<div id="berry"></div>

<script>
let player = document.getElementById("player");
let berry = document.getElementById("berry");

let x = 100;
let y = 100;

let bx = 200;
let by = 200;

function draw() {
    player.style.left = x + "px";
    player.style.top = y + "px";

    berry.style.left = bx + "px";
    berry.style.top = by + "px";
}

function collision() {
    if (Math.abs(x - bx) < 40 && Math.abs(y - by) < 40) {
        bx = Math.random() * window.innerWidth;
        by = Math.random() * window.innerHeight;
        alert("🍓 +1 berry!");
    }
}

document.addEventListener("keydown", (e) => {
    if (e.key === "w") y -= 10;
    if (e.key === "s") y += 10;
    if (e.key === "a") x -= 10;
    if (e.key === "d") x += 10;

    draw();
    collision();
});

draw();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>BERRY GAME</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    font-family: Arial;
}

/* --- START SCREEN --- */
#startScreen {
    position: absolute;
    width: 100%;
    height: 100%;
    background: linear-gradient(180deg, #0a0f1f, #1a1f3a);
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    color: white;
}

#startBtn {
    padding: 20px 40px;
    font-size: 24px;
    background: gold;
    border: none;
    border-radius: 15px;
    cursor: pointer;
}

/* --- GAME --- */
#game {
    width: 100vw;
    height: 100vh;
    background: radial-gradient(circle, #101a3a, #050912);
    position: relative;
    display: none;
}

/* UI */
#ui {
    position: absolute;
    top: 10px;
    left: 10px;
    color: white;
}

/* PLAYER */
#player {
    width: 60px;
    height: 60px;
    position: absolute;
    background: gold;
    border-radius: 15px;
    text-align: center;
    line-height: 60px;
    font-size: 30px;
    box-shadow: 0 0 20px gold;
}

/* ENEMY */
.enemy {
    width: 50px;
    height: 50px;
    background: red;
    border-radius: 50%;
    position: absolute;
}

/* BOMB */
.bomb {
    width: 18px;
    height: 18px;
    background: cyan;
    border-radius: 50%;
    position: absolute;
}

/* EXPLOSION */
.explosion {
    width: 100px;
    height: 100px;
    background: rgba(0,255,255,0.3);
    border-radius: 50%;
    position: absolute;
    transform: translate(-50%, -50%);
}
</style>
</head>

<body>

<div id="startScreen">
    <h1>🦄 BERRY GAME</h1>
    <button id="startBtn">▶ ИГРАТЬ</button>
</div>

<div id="game">
    <div id="ui">
        🍓: <span id="score">0</span><br>
        📈 LVL: <span id="lvl">1</span>
    </div>

    <div id="player">🧍</div>
</div>

<script>
let gameStarted = false;

let player = {
    x: window.innerWidth / 2,
    y: window.innerHeight / 2,
    speed: 4,
    level: 1,
    exp: 0
};

let score = 0;

let keys = {};
let mouse = {x:0, y:0};

const p = document.getElementById("player");

/* START */
document.getElementById("startBtn").onclick = () => {
    document.getElementById("startScreen").style.display = "none";
    document.getElementById("game").style.display = "block";
    gameStarted = true;
};

/* CONTROL */
document.addEventListener("keydown", e => keys[e.key] = true);
document.addEventListener("keyup", e => keys[e.key] = false);
document.addEventListener("mousemove", e => {
    mouse.x = e.clientX;
    mouse.y = e.clientY;
});

/* GAME LOOP */
function loop(){
    if(!gameStarted) return requestAnimationFrame(loop);

    if(keys["w"]) player.y -= player.speed;
    if(keys["s"]) player.y += player.speed;
    if(keys["a"]) player.x -= player.speed;
    if(keys["d"]) player.x += player.speed;

    p.style.left = player.x + "px";
    p.style.top = player.y + "px";

    requestAnimationFrame(loop);
}

/* SHOOT */
document.addEventListener("click", () => {
    if(!gameStarted) return;

    let b = document.createElement("div");
    b.className = "bomb";

    let dx = mouse.x - player.x;
    let dy = mouse.y - player.y;
    let dist = Math.sqrt(dx*dx + dy*dy);

    let vx = dx / dist * 8;
    let vy = dy / dist * 8;

    let x = player.x;
    let y = player.y;

    b.style.left = x + "px";
    b.style.top = y + "px";

    game.appendChild(b);

    let move = setInterval(() => {
        x += vx;
        y += vy;

        b.style.left = x + "px";
        b.style.top = y + "px";

        document.querySelectorAll(".enemy").forEach(en => {
            let ex = en.offsetLeft;
            let ey = en.offsetTop;

            if(Math.abs(x-ex)<40 && Math.abs(y-ey)<40){

                let efx = document.createElement("div");
                efx.className = "explosion";
                efx.style.left = x + "px";
                efx.style.top = y + "px";

                game.appendChild(efx);
                setTimeout(()=>efx.remove(),300);

                en.hp -= player.level;

                if(en.hp <= 0){
                    en.remove();
                    score++;
                    player.exp++;

                    if(player.exp >= 5){
                        player.level++;
                        player.exp = 0;
                    }

                    updateUI();
                }
            }
        });

    },20);

    setTimeout(()=>{
        clearInterval(move);
        b.remove();
    },2000);
});

/* ENEMY SPAWN */
function spawnEnemy(){
    let e = document.createElement("div");
    e.className = "enemy";

    e.x = Math.random()*window.innerWidth;
    e.y = Math.random()*window.innerHeight;

    e.hp = 2 + Math.floor(player.level * 1.5);

    e.style.left = e.x + "px";
    e.style.top = e.y + "px";

    game.appendChild(e);

    setInterval(()=>{
        let dx = player.x - e.x;
        let dy = player.y - e.y;

        e.x += dx * 0.01;
        e.y += dy * 0.01;

        e.style.left = e.x + "px";
        e.style.top = e.y + "px";
    },30);
}

setInterval(spawnEnemy,2000);

/* UI */
function updateUI(){
    document.getElementById("score").innerText = score;
    document.getElementById("lvl").innerText = player.level;
}

loop();
</script>

</body>
</html>

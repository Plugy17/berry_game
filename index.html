<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>BERRY RUNNER</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="menu" class="screen">
    <div id="welcome" class="welcome-text"></div>
    <div class="menu-stats-container">
        <div id="total-balance" class="balance-info">0</div>
        <div id="menuLeaderboard" class="record-info">🏆 0</div>
    </div>
    <div class="menu-controls">
        <input id="nick" placeholder="Введите ник..." maxlength="12" />
        <select id="difficulty">
            <option value="easy">🟢 Легко</option>
            <option value="medium" selected>🟡 Средне</option>
            <option value="hard">🔴 Сложно</option>
        </select>
        <button class="play-btn" onclick="startGame()">ИГРАТЬ</button>
        <button class="shop-btn" onclick="openShop()">🛒 Магазин</button>
    </div>
</div>

<div id="game" class="screen hidden">
    <div id="hud"></div> 
    <button id="backBtn" onclick="backToMenu()">🏠</button>
    <div id="combo-ui" class="hidden">x2</div>
    <div id="bonus-panel">
        <div class="bonus-btn" onclick="useShield()">🛡️ <span id="count-shield">0</span></div>
        <div class="bonus-btn" onclick="useMagnet()">🧲 <span id="count-magnet">0</span></div>
    </div>
    <div id="track">
        <div id="player"></div> 
        <div id="obstacle"></div> 
    </div>
</div>

<div id="shop" class="screen hidden">
    <div class="shop-overlay"></div>
    <h2 style="color: white; z-index: 5; margin-top: 50px;">🛒 МАГАЗИН</h2>
    <div id="shop-balance" class="balance-info" style="margin-bottom: 20px; z-index: 5;">Balance: 0</div>
    <div class="shop-item">
        <span>🛡️ ЩИТ (300)</span>
        <button onclick="buyItem('shield')" style="padding:10px; background:#ff4fd8; color:white; border:none; border-radius:10px;">КУПИТЬ</button>
    </div>
    <div class="shop-item">
        <span>🧲 МАГНИТ (500)</span>
        <button onclick="buyItem('magnet')" style="padding:10px; background:#ff4fd8; color:white; border:none; border-radius:10px;">КУПИТЬ</button>
    </div>
    <button onclick="closeShop()" style="margin-top:30px; padding:15px 40px; border-radius:20px; z-index:5;">Назад</button>
</div>

<script src="game.js"></script>
</body>
</html>

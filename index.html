<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>BERRY RUNNER ONLINE</title>
    <link rel="stylesheet" href="style.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
</head>
<body>

<div id="menu" class="screen">
    <div id="welcome" class="welcome-text"></div>
    <div class="menu-stats-container">
        <div id="total-balance" class="balance-info">0</div>
        <div id="menuLeaderboard" class="record-info">🏆 0</div>
    </div>
    <div class="menu-controls">
        <input id="nick" placeholder="Имя героя..." maxlength="12" />
        <select id="difficulty">
            <option value="easy">🟢 Легко</option>
            <option value="medium" selected>🟡 Средне</option>
            <option value="hard">🔴 Сложно</option>
        </select>
        <button onclick="startGame()">ИГРАТЬ</button>
        <button onclick="openShop()">🛒 Магазин</button>
    </div>
</div>

<div id="game" class="screen hidden">
    <div id="hud"></div> 
    <button id="backBtn" onclick="backToMenu()">🏠</button>
    <div id="combo-ui" class="hidden">x2</div>
    <div id="bonus-panel">
        <div class="bonus-btn" onclick="useShield()">🛡️ <span id="count-shield">0</span></div>
        <div class="bonus-btn" onclick="useMagnet()">🧲 <span id="count-magnet">0</span></div>
    </div>
    <div id="track">
        <div id="player"></div> 
        <div id="obstacle"></div> 
    </div>
</div>

<div id="shop" class="screen hidden">
    <div class="shop-overlay"></div>
    <h2 style="color: white; margin-top: 50px; z-index: 5;">🛒 МАГАЗИН</h2>
    <div id="shop-balance" class="balance-info" style="margin-bottom: 20px; z-index: 5;">0</div>
    <div class="shop-item">
        <span>🛡️ ЩИТ (300)</span>
        <button onclick="buyItem('shield')">КУПИТЬ</button>
    </div>
    <div class="shop-item">
        <span>🧲 МАГНИТ (500)</span>
        <button onclick="buyItem('magnet')">КУПИТЬ</button>
    </div>
    <button onclick="closeShop()" style="margin-top: 30px; padding: 10px 30px; border-radius: 15px; z-index: 5;">Назад</button>
</div>

<script>
  // ТВОЙ АКТУАЛЬНЫЙ КОНФИГ (ИСПРАВЛЕННЫЙ)
  const firebaseConfig = {
    apiKey: "AIzaSyABKHaAdlSFq1KzURXmCF5Q-9xMUgE4Ot0",
    authDomain: "berry-game-4fa9b.firebaseapp.com",
    databaseURL: "https://berry-game-4fa9b-default-rtdb.firebaseio.com",
    projectId: "berry-game-4fa9b",
    storageBucket: "berry-game-4fa9b.firebasestorage.app",
    messagingSenderId: "736707445306",
    appId: "1:736707445306:web:87a61ea4b725bd3071eb03",
    measurementId: "G-LLJ9L848G0"
  };

  // Инициализация базы данных
  try {
    firebase.initializeApp(firebaseConfig);
    window.db = firebase.database();
    console.log("✅ Firebase успешно подключен!");
  } catch (e) {
    console.error("❌ Ошибка инициализации:", e);
    window.db = null;
  }
</script>

<script src="game.js"></script>
</body>
</html>

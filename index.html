<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>BERRY RUNNER</title>

<script src="https://cdn.jsdelivr.net/npm/three@0.161.0/build/three.min.js"></script>

<style>
body { margin:0; overflow:hidden; background:#000; font-family:sans-serif; }

#ui {
    position:absolute;
    width:100%;
    color:white;
    text-align:center;
    z-index:10;
}

#menu, #gameOver {
    position:absolute;
    width:100%;
    height:100%;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    background:linear-gradient(135deg,#3b0a57,#7a2cff);
}

button {
    button onclick="startGame()">PLAY</button>
    padding:12px 30px;
    margin:10px;
    border:none;
    border-radius:10px;
    font-size:18px;
    cursor:pointer;
}

#hud {
    position:absolute;
    top:10px;
    left:10px;
    color:white;
}
</style>
</head>

<body>

<div id="menu">
    <h1>BERRY RUNNER</h1>
    <button onclick="startGame()">PLAY</button>
    <a href="#">Support</a>
</div>

<div id="gameOver" style="display:none;">
    <h1>GAME OVER</h1>
    <p id="finalScore"></p>
    <button onclick="restart()">RESTART</button>
    <button onclick="backMenu()">MENU</button>
</div>

<div id="hud">Score: 0</div>

<script src="game.js"></script>

</body>
</html>

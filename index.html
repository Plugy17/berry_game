<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BERRY RUNNER ONLINE</title>
    <link rel="stylesheet" href="style.css?v=1.2">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
</head>
<body>

<div id="menu" class="screen">
    <div id="menu-particles"></div>

    <div class="top-bar-container">
        <div id="welcome" class="welcome-text">Герой BERRY</div>
        <div class="menu-stats-container">
            <div id="total-balance" class="balance-info">0 <span class="ice-icon"></span></div>
            <div id="menuLeaderboard" class="record-info hidden">🏆 0</div>
        </div>
    </div>

    <div class="spacer-middle"></div>

    <div class="menu-controls">
        <input id="nick" type="text" placeholder="Имя героя..." maxlength="12" />
        <select id="difficulty">
            <option value="easy">🟩 Легко</option>
            <option value="medium" selected>🟨 Средне</option>
            <option value="hard">🟥 Сложно</option>
        </select>
        <button onclick="startGame()">ИГРАТЬ</button>
        <button onclick="openShop()">🛒 Магазин</button>
    </div>
</div>

<div id="game" class="screen hidden">
    <div id="hud">
        <span id="score-display">0</span> <span class="ice-icon"></span>
    </div> 
    
    <button id="backBtn" onclick="backToMenu()">🏠</button>
    
    <div id="combo-container">
        <div id="combo-ui" class="hidden">x2</div>
        <div id="combo-msg"></div> </div>

    <div id="bonus-panel">
        <div class="bonus-btn" onclick="useShield()">
            <img src="assets/shield_icon.png" class="bonus-icon-img" alt="Shield">
            <span id="count-shield">0</span>
        </div>
        <div class="bonus-btn" onclick="useMagnet()">
            <img src="assets/magnet_icon.png" class="bonus-icon-img" alt="Magnet">
            <span id="count-magnet">0</span>
        </div>
    </div>
    
    <div id="player"></div> 
    <div id="obstacle" style="position: absolute; width: 60px; height: 60px; background-size: contain; background-repeat: no-repeat;"></div> 
</div>

<div id="shop" class="screen hidden">
    <div class="shop-balance-container">
        <span id="shop-balance">0</span> <span class="ice-icon"></span>
    </div>

    <div class="shop-container">
        <div class="shop-item">
            <img src="assets/shield_icon.png" alt="Shield">
            <div class="item-title">ЩИТ</div>
            <button class="buy-button" onclick="buyItem('shield')">КУПИТЬ (300 🍦)</button>
        </div>

        <div class="shop-item">
            <img src="assets/magnet_icon.png" alt="Magnet">
            <div class="item-title">МАГНИТ</div>
            <button class="buy-button" onclick="buyItem('magnet')">КУПИТЬ (500 🍦)</button>
        </div>
    </div>

    <button id="backBtn" onclick="closeShop()">НАЗАД</button>
</div>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyABKHaAdlSFq1KzURXmCF5Q-9xMUgE4Ot0",
    authDomain: "berry-game-4fa9b.firebaseapp.com",
    databaseURL: "https://berry-game-4fa9b-default-rtdb.firebaseio.com",
    projectId: "berry-game-4fa9b",
    storageBucket: "berry-game-4fa9b.firebasestorage.app",
    messagingSenderId: "736707445306",
    appId: "1:736707445306:web:87a61ea4b725bd3071eb03",
    measurementId: "G-LLJ9L848G0"
  };
  try {
    firebase.initializeApp(firebaseConfig);
    window.db = firebase.database();
  } catch (e) { window.db = null; }
</script>
<script src="game.js"></script>
</body>
</html>

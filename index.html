<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BERRY RUNNER ONLINE</title>
    <!-- Обновлена ссылка на стили для стабильной загрузки -->
    <link rel="stylesheet" href="style.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
</head>
<body>

<div id="menu" class="screen">
    <div id="menu-particles"></div>

    <!-- Шапка всегда сверху -->
    <div class="top-bar-container">
        <div id="welcome" class="welcome-text">Герой BERRY</div>
        <div class="menu-stats-container">
            <!-- Основной баланс игрока (Мороженое и Золото) -->
            <div id="total-balance" class="balance-info">0 <span class="ice-icon"></span></div>
            <!-- Рекорд -->
            <div id="menuLeaderboard" class="record-info">🏆 0</div>
        </div>
    </div>

    <!-- Новая область прокрутки для кнопок -->
    <div class="menu-controls">
        <input id="nick" type="text" placeholder="Имя героя..." maxlength="12" />
        
        <label style="color: white; font-weight: 800; font-size: 14px; margin-top: 10px; margin-bottom: -5px;">СЛОЖНОСТЬ:</label>
        <select id="difficulty">
            <option value="easy">🟩 Легко</option>
            <option value="medium" selected>🟨 Средне</option>
            <option value="hard">🟥 Сложно</option>
        </select>
        
        <button onclick="startGame()">ИГРАТЬ</button>
        <!-- Разделение функционала с поддержкой свайпа -->
        <button onclick="openBuffs()">⚡ Баффы</button>
        <button onclick="openShop()">💎 VIP Магазин</button>
        <button onclick="openLeaderboard()">🏆 Рейтинг</button>
        
        <!-- Дополнительный отступ снизу для удобства прокрутки -->
        <div style="height: 40px; width: 100%;"></div>
    </div>
</div>

<div id="game" class="screen hidden">
    <!-- Слой для взрывов и частиц -->
    <div id="effects-layer"></div>

    <!-- HUD теперь управляется целиком через JS для компактности -->
    <div id="hud">
        <span class="ice-icon"></span> 0 | <span class="golden-ice-icon-small"></span> 0 | 🏆 0
    </div> 
    
    <button id="backBtn" onclick="backToMenu()">🏠</button>
    
    <div id="combo-container">
        <div id="combo-ui" class="hidden">x2</div>
        <div id="combo-msg"></div> 
    </div>

    <div id="bonus-panel">
        <div class="bonus-btn" onclick="useShield()">
            <img src="assets/shield_icon.png" class="bonus-icon-img" alt="Shield">
            <span id="count-shield">0</span>
        </div>
        <div class="bonus-btn" onclick="useMagnet()">
            <img src="assets/magnet_icon.png" class="bonus-icon-img" alt="Magnet">
            <span id="count-magnet">0</span>
        </div>
    </div>
    
    <div id="player"></div> 
    <div id="obstacle"></div> 
</div>

<div id="gameOverScreen" class="hidden">
    <div class="go-card">
        <div class="go-title">БА-БАХ!</div>
        <div class="go-stats">
            <span class="ice-icon-big"></span>
            <span id="final-score">0</span>
        </div>
        <div class="go-btn-container">
            <!-- Кнопка воскрешения за золото -->
            <button id="revive-btn" class="btn-revive" onclick="tryRevive()" style="display: none; background: linear-gradient(180deg, #ffd700, #ff8c00);">
                ✨ ВОСКРЕСНУТЬ (1 <span class="golden-ice-icon-small"></span>)
            </button>
            <button class="btn-restart" onclick="startGame()">ИГРАТЬ ЕЩЕ</button>
            <button class="btn-exit" onclick="backToMenu()">В МЕНЮ</button>
        </div>
    </div>
</div>

<!-- ЭКРАН БАФФОВ (ОБЫЧНЫЙ МАГАЗИН) -->
<div id="shop" class="screen hidden">
    <h2 class="shop-title">БАФФЫ</h2>

    <div class="shop-balance-container">
        <div id="balance-anim-target" class="shop-balance-wrapper">
            <span id="shop-balance">0 <span class="ice-icon"></span></span>
        </div>
    </div>

    <div class="shop-container">
        <div class="shop-item">
            <img src="assets/shield_icon.png" alt="Shield">
            <div class="item-title">ЩИТ</div>
            <button class="buy-button" onclick="buyItem('shield')">
                КУПИТЬ 300 <span class="ice-icon"></span>
            </button>
        </div>

        <div class="shop-item">
            <img src="assets/magnet_icon.png" alt="Magnet">
            <div class="item-title">МАГНИТ</div>
            <button class="buy-button" onclick="buyItem('magnet')">
                КУПИТЬ 500 <span class="ice-icon"></span>
            </button>
        </div>

        <!-- Кнопка обмена валюты прямо в баффах для удобства -->
        <div class="shop-item" style="border: 2px solid #ffd700;">
            <div class="item-title" style="color: #ffd700;">ОБМЕННИК</div>
            <p style="font-size: 10px; color: #fff;">5000 🍦 = 1 💎</p>
            <button class="buy-button" onclick="convertIceToGold()" style="background: #444;">
                ОБМЕНЯТЬ
            </button>
        </div>
    </div>

    <button id="backBtnShop" class="shop-exit-btn" onclick="closeShop()">НАЗАД</button>
</div>

<!-- НОВЫЙ ЭКРАН VIP МАГАЗИНА (ЗОЛОТО) -->
<div id="realShop" class="screen hidden">
    <h2 class="shop-title">VIP МАГАЗИН</h2>
    <div class="shop-container">
        <div class="shop-item">
            <div class="item-title">GOLD СКИН</div>
            <p style="font-size: 10px; color: #aaa;">+10% к силе магнита</p>
            <button class="buy-button" onclick="buyVipItem('skin')" style="background: #d4af37;">
                10 <span class="golden-ice-icon-small"></span>
            </button>
        </div>
        <div class="shop-item">
            <div class="item-title">+1 ЯЧЕЙКА ЩИТА</div>
            <p style="font-size: 10px; color: #aaa;">Больше щитов в запас</p>
            <button class="buy-button" onclick="buyVipItem('slot')" style="background: #d4af37;">
                5 <span class="golden-ice-icon-small"></span>
            </button>
        </div>
    </div>
    <button class="shop-exit-btn" onclick="document.getElementById('realShop').classList.add('hidden'); document.getElementById('menu').classList.remove('hidden');">НАЗАД</button>
</div>

<!-- ЭКРАН РЕЙТИНГА -->
<div id="leaderboardScreen" class="screen hidden">
    <h2 class="shop-title">ГЕРОИ</h2>
    <div class="leaderboard-container">
        <div id="leaderboard-list"></div>
    </div>
    <button class="shop-exit-btn" onclick="closeLeaderboard()">НАЗАД</button>
</div>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyABKHaAdlSFq1KzURXmCF5Q-9xMUgE4Ot0",
    authDomain: "berry-game-4fa9b.firebaseapp.com",
    databaseURL: "https://berry-game-4fa9b-default-rtdb.firebaseio.com",
    projectId: "berry-game-4fa9b",
    storageBucket: "berry-game-4fa9b.firebasestorage.app",
    messagingSenderId: "736707445306",
    appId: "1:736707445306:web:87a61ea4b725bd3071eb03",
    measurementId: "G-LLJ9L848G0"
  };
  try {
    firebase.initializeApp(firebaseConfig);
    window.db = firebase.database();
  } catch (e) { console.error("Firebase init error:", e); window.db = null; }

  // Функция для открытия реального магазина (VIP)
  function openShop() {
      document.getElementById('menu').classList.add('hidden');
      document.getElementById('realShop').classList.remove('hidden');
  }
</script>
<script src="game.js"></script>
</body>
</html>

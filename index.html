<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BERRY RUNNER ONLINE</title>
    <!-- Обновлена ссылка на стили для стабильной загрузки -->
    <link rel="stylesheet" href="style.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>

<div id="menu" class="screen">
    <div id="menu-particles"></div>

    <div class="top-bar-container">
        <div id="welcome" class="welcome-text">Герой BERRY</div>
        <div class="menu-stats-container">
            <!-- Основной баланс игрока -->
            <div id="total-balance" class="balance-info">0 <span class="ice-icon"></span></div>
            <!-- Рекорд -->
            <div id="menuLeaderboard" class="record-info">🏆 0</div>
        </div>
    </div>

    <div class="spacer-middle"></div>

    <div class="menu-controls">
        <input id="nick" type="text" placeholder="Имя героя..." maxlength="12" />
        <select id="difficulty">
            <option value="easy">🟩 Легко</option>
            <option value="medium" selected>🟨 Средне</option>
            <option value="hard">🟥 Сложно</option>
        </select>
        <button onclick="startGame()">ИГРАТЬ</button>
        <button onclick="openShop()">🛒 Магазин</button>
    </div>
</div>

<div id="game" class="screen hidden">
    <!-- Слой для взрывов и частиц -->
    <div id="effects-layer"></div>

    <!-- HUD теперь управляется целиком через JS для компактности -->
    <div id="hud">
        <span class="ice-icon"></span> 0 | 🏆 0
    </div> 
    
    <button id="backBtn" onclick="backToMenu()">🏠</button>
    
    <div id="combo-container">
        <div id="combo-ui" class="hidden">x2</div>
        <div id="combo-msg"></div> 
    </div>

    <div id="bonus-panel">
        <div class="bonus-btn" onclick="useShield()">
            <img src="assets/shield_icon.png" class="bonus-icon-img" alt="Shield">
            <span id="count-shield">0</span>
        </div>
        <div class="bonus-btn" onclick="useMagnet()">
            <img src="assets/magnet_icon.png" class="bonus-icon-img" alt="Magnet">
            <span id="count-magnet">0</span>
        </div>
    </div>
    
    <div id="player"></div> 
    <div id="obstacle"></div> 
</div>

<div id="gameOverScreen" class="hidden">
    <div class="go-card">
        <div class="go-title">БА-БАХ!</div>
        <div class="go-stats">
            <span class="ice-icon-big"></span>
            <span id="final-score">0</span>
        </div>
        <div class="go-btn-container">
            <button class="btn-restart" onclick="startGame()">ИГРАТЬ ЕЩЕ</button>
            <button class="btn-exit" onclick="backToMenu()">В МЕНЮ</button>
        </div>
    </div>
</div>

<div id="shop" class="screen hidden">
    <h2 class="shop-title">МАГАЗИН</h2>

    <div class="shop-balance-container">
        <!-- Обертка для анимации покупки -->
        <div id="balance-anim-target" class="shop-balance-wrapper">
            <!-- Сюда JS вставит число и иконку -->
            <span id="shop-balance">0 <span class="ice-icon"></span></span>
        </div>
    </div>

    <div class="shop-container">
        <div class="shop-item">
            <img src="assets/shield_icon.png" alt="Shield">
            <div class="item-title">ЩИТ</div>
            <button class="buy-button" onclick="buyItem('shield')">
                КУПИТЬ 300 <span class="ice-icon"></span>
            </button>
        </div>

        <div class="shop-item">
            <img src="assets/magnet_icon.png" alt="Magnet">
            <div class="item-title">МАГНИТ</div>
            <button class="buy-button" onclick="buyItem('magnet')">
                КУПИТЬ 500 <span class="ice-icon"></span>
            </button>
        </div>
    </div>

    <button id="backBtnShop" class="shop-exit-btn" onclick="closeShop()">НАЗАД</button>
</div>

    firebase.initializeApp(firebaseConfig);
    window.db = firebase.database();
  } catch (e) { console.error("Firebase init error:", e); window.db = null; }
</script>
<script src="game.js?v=4.7"></script>
</body>
</html>

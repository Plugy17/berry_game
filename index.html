<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>BERRY GAME</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    font-family: Arial;
}

/* START */
#startScreen {
    position: absolute;
    width: 100%;
    height: 100%;
    background: linear-gradient(180deg, #0a0f1f, #1a1f3a);
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    color: white;
}

#startBtn {
    padding: 20px 40px;
    font-size: 24px;
    background: gold;
    border: none;
    border-radius: 15px;
    cursor: pointer;
}

/* GAME */
#game {
    width: 100vw;
    height: 100vh;
    background: radial-gradient(circle, #101a3a, #050912);
    position: relative;
    display: none;
}

/* UI */
#ui {
    position: absolute;
    top: 10px;
    left: 10px;
    color: white;
}

/* PLAYER */
#player {
    width: 60px;
    height: 60px;
    position: absolute;
    background: gold;
    border-radius: 15px;
    text-align: center;
    line-height: 60px;
    font-size: 30px;
}

/* ENEMY */
.enemy {
    width: 50px;
    height: 50px;
    background: red;
    border-radius: 50%;
    position: absolute;
}

/* BOMB */
.bomb {
    width: 18px;
    height: 18px;
    background: cyan;
    border-radius: 50%;
    position: absolute;
}

/* PET */
#pet {
    position: absolute;
    font-size: 30px;
}
</style>
</head>

<body>

<div id="startScreen">
    <h1>🦄 BERRY GAME</h1>
    <button id="startBtn">▶ ИГРАТЬ</button>
</div>

<div id="game">
    <div id="ui">
        🍓: <span id="score">0</span><br>
        📈 LVL: <span id="lvl">1</span><br>
        ❤️ HP: <span id="hp">10</span>
    </div>

    <div id="player">🧍</div>
</div>

<!-- ПОДКЛЮЧЕНИЕ JS -->
<script src="game.js"></script>

</body>
</html>
